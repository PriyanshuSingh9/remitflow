[profile.default]
src = "src"
out = "out"
libs = ["lib"]

remappings = ["@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"]

[rpc_endpoints]
local = "http://127.0.0.1:8545"
amoy = "${POLYGON_AMOY_RPC_URL}"
